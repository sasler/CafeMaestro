name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore CafeMaestro.sln

      - name: Build (Windows)
        run: dotnet build CafeMaestro\CafeMaestro.csproj -f net10.0-windows10.0.19041.0 -c Release --no-restore

      - name: Build (Android)
        run: dotnet build CafeMaestro\CafeMaestro.csproj -f net10.0-android -c Release --no-restore

      - name: Run tests
        run: dotnet test CafeMaestro.Tests\CafeMaestro.Tests.csproj --no-restore -v normal
